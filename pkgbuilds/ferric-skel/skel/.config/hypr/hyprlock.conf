# FerricOS // Quiet Ferric — hyprlock
# Flat field, 1px seams, no blur/glow (palette rules).

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    color = rgb(0C0B0A)
    # no path: solid color only — no blur to be had
}

# instrument label
label {
    monitor =
    text = LOCKED // FERRIC
    color = rgb(544C44)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

# clock
label {
    monitor =
    text = $TIME
    color = rgb(C9BFB2)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 44
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgb(2E2A26)
    inner_color = rgb(11100E)
    font_color = rgb(E8DCC8)
    check_color = rgb(D85A30)
    fail_color = rgb(C14A3A)
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span foreground="##544C44">passphrase</span>
    fail_text = <span foreground="##C14A3A">DENIED // $ATTEMPTS</span>
    rounding = 4
    position = 0, -60
    halign = center
    valign = center
}
