# FerricOS Calamares sequence — modeled on the EndeavourOS online-install
# flow: partition → mount → pacstrap the FerricOS set → configure → grub.
---
modules-search: [ local ]

instances:
  - id: copyconf
    module: shellprocess
    config: shellprocess-copyconf.conf
  - id: bootcfg
    module: shellprocess
    config: shellprocess-bootcfg.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - pacstrap
      - shellprocess@copyconf
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - luksbootkeyfile
      - users
      - networkcfg
      - hwclock
      - services-systemd
      - initcpiocfg
      - shellprocess@bootcfg
      - initcpio
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

branding: ferric
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
