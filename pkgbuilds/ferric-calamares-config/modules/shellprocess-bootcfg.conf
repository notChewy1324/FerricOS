# Boot-chain theming on the TARGET (Phase 7). Runs chrooted, after
# initcpiocfg wrote HOOKS but BEFORE initcpio builds the image, so the
# plymouth hook lands in the initramfs (and before grubcfg/bootloader so
# the grub defaults are picked up).
---
dontChroot: false
timeout: 120
script:
  # themed tuigreet on the target (greetd's stock config runs agreety)
  - command: "install -Dm644 /usr/share/ferric/greetd.toml /etc/greetd/config.toml"
  # mkinitcpio: insert the plymouth hook right after udev (idempotent)
  - command: "sh -c 'grep -qE \"^HOOKS=.*plymouth\" /etc/mkinitcpio.conf || sed -i \"s/\\budev\\b/udev plymouth/\" /etc/mkinitcpio.conf'"
  # select the ferric splash (writes /etc/plymouth/plymouthd.conf; the
  # initramfs itself is rebuilt by the following initcpio module)
  - command: "plymouth-set-default-theme ferric"
  # kernel cmdline: splash for plymouth (quiet is Arch's default there)
  - command: "sh -c 'grep -q splash /etc/default/grub || sed -i \"s/^GRUB_CMDLINE_LINUX_DEFAULT=\\\"/&splash /\" /etc/default/grub'"
  # GRUB theme: replace an existing (possibly commented) GRUB_THEME or append
  - command: "sh -c 'if grep -q \"^#\\?GRUB_THEME=\" /etc/default/grub; then sed -i \"s|^#\\?GRUB_THEME=.*|GRUB_THEME=\\\"/usr/share/grub/themes/ferric/theme.txt\\\"|\" /etc/default/grub; else echo GRUB_THEME=\\\"/usr/share/grub/themes/ferric/theme.txt\\\" >> /etc/default/grub; fi'"
