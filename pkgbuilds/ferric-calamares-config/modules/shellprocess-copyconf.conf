# Persist the live pacman.conf ([ferric] + [multilib]) onto the target so
# installed systems keep receiving ferric updates. The live [ferric] points
# at the on-ISO repo (/opt/ferric-repo), so carry that to the target too —
# the copied pacman.conf keeps working after reboot with no hosted repo.
---
dontChroot: true
timeout: 60
script:
  - command: "cp /etc/pacman.conf @@ROOT@@/etc/pacman.conf"
  - command: "sh -c 'test -d /opt/ferric-repo && cp -a /opt/ferric-repo @@ROOT@@/opt/ || true'"
