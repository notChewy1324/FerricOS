# Packages pacstrapped onto the target. pacstrap reads the LIVE session's
# /etc/pacman.conf, so [ferric] + [multilib] are available here; the
# shellprocess@copyconf step then persists that pacman.conf to the target.
# Hardware layer (ucode, headers) is included; nvidia stays optional/manual —
# hardware bits never enter the distro definition.
---
basePackages:
  - base
  - linux
  - linux-firmware
  - linux-headers
  - amd-ucode
  - intel-ucode
  - grub
  - efibootmgr
  - sudo
  - vim
  - git
  - ferric-base
  # boot theming (Phase 7) — activated by shellprocess@bootcfg
  - plymouth
  - ferric-plymouth
  - ferric-grub-theme
