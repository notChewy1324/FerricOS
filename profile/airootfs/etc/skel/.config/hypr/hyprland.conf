# FerricOS // Quiet Ferric — Hyprland
# NOTE: Hyprland config syntax drifts between versions. If a section errors
# on a newer release, check the wiki migration notes for that block.

monitor = , preferred, auto, 1

# ── autostart ────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── palette ──────────────────────────────────────────────
$ferric   = rgb(D85A30)
$seam     = rgb(2E2A26)

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = $ferric
    col.inactive_border = $seam
    layout = dwindle
}

decoration {
    rounding = 4
    # quiet ferric: no blur, no glow
    blur { enabled = false }
}

animations {
    enabled = true
    bezier = quiet, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 3, quiet
    animation = workspaces, 1, 3, quiet
    animation = fade, 1, 3, quiet
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad { natural_scroll = true }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── binds ────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, fuzzel
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod SHIFT, M, exit

# focus / move / resize — arrows
bind  = $mod, left,  movefocus, l
bind  = $mod, right, movefocus, r
bind  = $mod, up,    movefocus, u
bind  = $mod, down,  movefocus, d
bind  = $mod SHIFT, left,  movewindow, l
bind  = $mod SHIFT, right, movewindow, r
bind  = $mod SHIFT, up,    movewindow, u
bind  = $mod SHIFT, down,  movewindow, d
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, right, resizeactive,  40 0
binde = $mod CTRL, up,    resizeactive, 0 -40
binde = $mod CTRL, down,  resizeactive, 0  40

# workspaces 1-9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# screenshots → clipboard
bind = , Print, exec, grim - | wl-copy
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy

# media & brightness & dark/light modes
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute, exec, pamixer -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
env = ADW_DISABLE_PORTAL,1
env = QT_QPA_PLATFORMTHEME,qt6ct

# mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto