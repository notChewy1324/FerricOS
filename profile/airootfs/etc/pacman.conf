#
# /etc/pacman.conf — FerricOS runtime pacman configuration
#
# This file overlays the LIVE session and is what `archinstall`/installers
# copy to the target. It must mirror profile/pacman.conf's repo set
# ([ferric] and [multilib] must be in BOTH files).
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ── [ferric] — RUNTIME repo (live session + what installers copy) ────────
# Managed by scripts/publish-packages.sh: once the `packages` GitHub release
# is a working pacman repo it wires the block below to the GitHub URL.
# SigLevel stays Optional TrustAll until ferric-keyring ships, then flip to
# Required DatabaseOptional.
# FERRIC-REPO-BEGIN
# (disabled — publish packages first: scripts/publish-packages.sh)
# FERRIC-REPO-END
