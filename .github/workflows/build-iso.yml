name: Build FerricOS ISO

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    - cron: "0 8 1 * *"     # monthly: 1st of the month, 08:00 UTC

permissions:
  contents: write           # needed to create releases

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm archiso git github-cli

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkarchiso -v -w /tmp/work -o /tmp/out ./profile
          ls -lh /tmp/out

      - name: Checksums
        run: |
          cd /tmp/out
          sha256sum *.iso > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          TAG="v$(date +%Y.%m.%d)"
          gh release create "$TAG" /tmp/out/*.iso /tmp/out/SHA256SUMS \
            --title "FerricOS $TAG" \
            --notes "Automated monthly build. Verify with SHA256SUMS." \
            || gh release upload "$TAG" /tmp/out/*.iso /tmp/out/SHA256SUMS --clobber
